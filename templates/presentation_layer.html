{% extends "base.html" %}

{% block content %}
<div class="card">
  <div class="section-title">
    <h2>Presentation Layer Alignment</h2>
    <span class="badge">Session IFC workflow</span>
  </div>
  <div class="grid-3">
    <div class="field">
      <label for="plpIfc">IFC file</label>
      <select id="plpIfc" data-files-select></select>
    </div>
    <label class="toggle">
      <input type="checkbox" id="plpUseUploadedOnly" />
      <span>Use uploaded CSV only</span>
    </label>
    <div class="field">
      <label for="plpExtractPrimary">Extract presentation layers</label>
      <button class="btn" id="plpExtractPrimary" type="button">Extract layers from model</button>
    </div>
    <div class="field">
      <label for="plpSearch">Search layers</label>
      <input id="plpSearch" type="text" placeholder="Find existing layer" />
    </div>
  </div>
  <div class="inline-actions sticky-actions">
    <button class="btn secondary" id="plpDownloadTemplate">Download template CSV</button>
    <input type="file" id="plpAllowedFile" accept=".csv" />
    <button class="btn" id="plpExtract">Refresh extracted layers</button>
    <button class="btn secondary" id="plpAcceptAll">Accept all suggestions</button>
    <button class="btn secondary" id="plpAcceptHigh">Accept high-confidence</button>
    <button class="btn" id="plpApply">Apply changes</button>
  </div>
  <div class="status muted" id="plpStats">Select an IFC file to begin.</div>
  <div class="status muted" id="plpCsvStatus"></div>
</div>

<div class="card">
  <div class="inline-actions">
    <button class="btn secondary sm" data-plp-filter="all">All</button>
    <button class="btn secondary sm" data-plp-filter="exact">Exact match</button>
    <button class="btn secondary sm" data-plp-filter="suggested">Suggested</button>
    <button class="btn secondary sm" data-plp-filter="unmatched">Unmatched</button>
    <button class="btn secondary sm" data-plp-filter="changed">Changed only</button>
  </div>
  <div class="inline-actions">
    <button class="btn secondary sm" id="plpSetSelected">Set final for selected</button>
    <input type="text" id="plpBatchValue" placeholder="LayerCode--LayerDescription" />
    <button class="btn secondary sm" id="plpFillDown">Fill-down from first selected</button>
  </div>
  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Select</th>
          <th>Apply</th>
          <th>Existing Layer</th>
          <th>Match Status</th>
          <th>Suggested Allowed Layer</th>
          <th>Final Layer Value</th>
          <th>Count</th>
          <th>Confidence</th>
        </tr>
      </thead>
      <tbody id="plpResultsBody"></tbody>
    </table>
  </div>
  <div class="status muted" id="plpResultsStatus">No extracted layers yet.</div>
</div>

<div class="card">
  <h3>Outputs</h3>
  <div class="status" id="plpApplyStatus"></div>
  <div class="file-list" id="plpDownloads"></div>
</div>
{% endblock %}
